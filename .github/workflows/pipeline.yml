name: CI/CD TopFrango

on:
  push:
    branches: [ "main", "master" ]

jobs:
  testes-e-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v3

    - name: Configurar Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Rodar Testes do Servidor
      working-directory: ./Servidor
      run: |
        rm -rf node_modules
        npm install
        npm test

    - name: Login no Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # CD: Build e Push do Backend
    - name: Build e Push da Imagem do Backend
      uses: docker/build-push-action@v4
      with:
        context: ./Servidor
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/topfrango-backend:latest 

    # CD: Build e Push do Frontend
    - name: Build e Push da Imagem do Frontend
      uses: docker/build-push-action@v4
      with:
        context: ./sistema-pdv
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/topfrango-frontend:latest