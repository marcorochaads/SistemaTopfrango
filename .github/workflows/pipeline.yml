name: CI/CD TopFrango

# Avisa o robô para rodar sempre que houver um git push na branch main (ou master)
on:
  push:
    branches: [ "main", "master" ]

jobs:
  testes-e-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. O robô baixa o seu código
    - name: Checkout do código
      uses: actions/checkout@v3

    # 2. O robô prepara o Node.js (na mesma versão 18 que você usou no Dockerfile!)
    - name: Configurar Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    # 3. INTEGRAÇÃO CONTÍNUA (CI): Entra na pasta do Servidor, instala tudo e roda os seus testes
    - name: Rodar Testes do Servidor
      working-directory: ./Servidor
      run: |
        rm -rf node_modules
        npm install
        npm test

    # 4. ENTREGA CONTÍNUA (CD): O robô usa as senhas do cofre para logar no Docker Hub
    - name: Login no Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 5. O robô cria o contêiner usando o seu Dockerfile e envia para a nuvem!
    - name: Build e Push da Imagem do Backend
      uses: docker/build-push-action@v4
      with:
        context: ./Servidor
        push: true
        # Aqui ele junta seu nome de usuário com o nome do projeto
        tags: ${{ secrets.DOCKER_USERNAME }}/topfrango-backend:latest